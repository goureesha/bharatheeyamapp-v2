name: bharatheeyam
description: "ಭಾರತೀಯಮ್ - Vedic Astrology App"
publish_to: 'none'
version: 1.9.18+39

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.19.0
  sweph: ^3.2.1+2.10.3
  shared_preferences: any
  google_mobile_ads: any
  in_app_purchase: ^3.2.0
  share_plus: ^10.0.0
  path_provider: any
  google_sign_in: ^6.2.0
  url_launcher: any
  pdf: ^3.11.3
  printing: ^5.14.2
  table_calendar: ^3.1.3
  package_info_plus: ^8.0.0
  uuid: ^4.5.1
  file_picker: ^10.3.10
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
