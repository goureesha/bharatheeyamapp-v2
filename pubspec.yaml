name: bharatheeyam
description: "ಭಾರತೀಯಮ್ - Vedic Astrology App"
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.19.0
  sweph: ^3.2.1+2.10.3
  shared_preferences: any
  google_mobile_ads: any
  in_app_purchase: ^3.2.0
  share_plus: ^10.0.0
  path_provider: any
  google_sign_in: any
  googleapis: any
  extension_google_sign_in_as_googleapis_auth: any
  url_launcher: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
