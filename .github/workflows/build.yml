name: Build AAB & Flutter Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_android:
    name: 🤖 Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bharatheeyam-release.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=bharatheeyam-release.jks" >> android/key.properties

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build AAB (Play Store)
        run: |
          flutter build appbundle --release --verbose 2>&1 | tee build_output.txt || true
          # Check if AAB was produced
          if [ ! -f build/app/outputs/bundle/release/app-release.aab ]; then
            ERROR_LINES=$(grep -i -E "error|failure|exception|duplicate" build_output.txt | tail -20 | tr '\n' ' ')
            echo "::error::AAB FAILED: $ERROR_LINES"
            tail -50 build_output.txt
            exit 1
          fi

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_output.txt
          retention-days: 7

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bharatheeyam-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build_web:
    name: 🌐 Build Flutter Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Web
        run: flutter config --enable-web

      - name: Build Web
        run: flutter build web --release --base-href "/bharatheeyamapp/"

      - name: Copy booking page into web build
        run: cp docs/booking.html build/web/booking.html

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharatheeyam-web
          path: build/web
          retention-days: 7

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
