name: Build APK & Flutter Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_apk:
    name: ðŸ¤– Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bharatheeyam-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build_web:
    name: 🌐 Build Flutter Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Web
        run: flutter config --enable-web

      - name: Build Web
        run: |
          flutter build web --release --base-href "/bharatheeyamapp/" > web_build_log.txt 2>&1 || true
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add web_build_log.txt
          git commit -m "ci: push web build log"
          git push

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharatheeyam-web
          path: build/web
          retention-days: 7

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
