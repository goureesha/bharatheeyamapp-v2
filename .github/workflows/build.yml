name: Build APK & Flutter Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create debug keystore
        run: |
          mkdir -p android/app
          # Use debug signing for APK (no Play Store secrets needed)
          keytool -genkey -v -keystore android/app/debug.jks -keyalg RSA -keysize 2048 -validity 10000 -alias debug -storepass android -keypass android -dname "CN=Debug,O=Debug,C=US"
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=debug" >> android/key.properties
          echo "storeFile=debug.jks" >> android/key.properties

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --verbose 2>&1 | tee build_output.txt || true
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "::error::$(grep -i -E 'FAILURE:|Compilation error' build_output.txt | head -5 | tr '\n' ' ')"
            tail -50 build_output.txt
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bharatheeyam-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7


  build_web:
    name: 🌐 Build Flutter Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Web
        run: flutter config --enable-web

      - name: Build Web
        run: flutter build web --release --base-href "/bharatheeyamapp-v2/"

      - name: Copy docs into web build
        run: |
          cp docs/*.html build/web/ || true
          cp docs/*.md build/web/ || true

      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
